name: Docs

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches:
      - main
    paths:
      - src/**
      - .github/scripts/**
      - .github/actions/update-index/**
      - .github/workflows/Docs.yml
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    branches:
      - main
    paths:
      - src/**
      - .github/scripts/**
      - .github/workflows/Docs.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read # super-linter: read packages
      statuses: write # super-linter: report status checks
      pull-requests: write # super-linter: post PR summary comment
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint code base
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ENABLE_GITHUB_ACTIONS_STEP_SUMMARY: true
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: true
          SAVE_SUPER_LINTER_SUMMARY: true
          VALIDATE_BIOME_LINT: false
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_JSCPD: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_MARKDOWN_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_HTML_PRETTIER: false

  publish:
    name: Publish
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: https://psmodule.io/docs/
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SCRIBBLER_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SCRIBBLER_BOT_PRIVATE_KEY }}

      - name: Update index
        uses: ./.github/actions/update-index
        with:
          ClientID: ${{ secrets.SCRIBBLER_BOT_CLIENT_ID }} # zizmor: ignore[secrets-outside-env]
          PrivateKey: ${{ secrets.SCRIBBLER_BOT_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Install Zensical
        run: pip install zensical

      - name: Build Zensical project
        run: zensical build --clean
        working-directory: src

      - name: Publish live docs
        id: publish-live
        shell: pwsh
        run: ./.github/scripts/docs/Publish-LiveDocs.ps1 -Repository "${{ github.repository }}" -Token "${{ steps.app-token.outputs.token }}" -BuildDirectory "$PWD/src/site" -HeadBranch "scribbler/publish/main" -CommitSha "${{ github.sha }}"

  preview:
    name: Preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: [lint]
    runs-on: ubuntu-24.04
    environment:
      name: pr-preview-${{ github.event.number }}
      url: ${{ steps.preview-url.outputs.url }}
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write
    env:
      PREVIEW_PAGES_BRANCH: scribbler/preview/pr-${{ github.event.number }}
      PREVIEW_URL: https://psmodule.io/docs/previews/pr-${{ github.event.number }}/
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SCRIBBLER_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SCRIBBLER_BOT_PRIVATE_KEY }}

      - name: Update index
        uses: ./.github/actions/update-index
        with:
          ClientID: ${{ secrets.SCRIBBLER_BOT_CLIENT_ID }} # zizmor: ignore[secrets-outside-env]
          PrivateKey: ${{ secrets.SCRIBBLER_BOT_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x

      - name: Install Zensical
        run: pip install zensical

      - name: Build preview site
        shell: pwsh
        run: |
          ./.github/scripts/docs/Set-ZensicalSiteUrl.ps1 -ConfigPath "$PWD/zensical.toml" -SiteUrl "${{ env.PREVIEW_URL }}"
          zensical build --clean
        working-directory: src

      - name: Publish preview docs
        id: preview-url
        shell: pwsh
        run: ./.github/scripts/docs/Publish-PreviewDocs.ps1 -Repository "${{ github.repository }}" -Token "${{ steps.app-token.outputs.token }}" -PullRequestNumber ${{ github.event.number }} -PreviewUrl "${{ env.PREVIEW_URL }}" -BuildDirectory "$PWD/src/site" -HeadBranch "${{ env.PREVIEW_PAGES_BRANCH }}"

  preview-cleanup:
    name: Preview cleanup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      deployments: write
      issues: write
      pull-requests: write
    env:
      PREVIEW_CLEANUP_BRANCH: scribbler/preview-cleanup/pr-${{ github.event.number }}
      PREVIEW_URL: https://psmodule.io/docs/previews/pr-${{ github.event.number }}/
      PREVIEW_ENVIRONMENT: pr-preview-${{ github.event.number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SCRIBBLER_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SCRIBBLER_BOT_PRIVATE_KEY }}

      - name: Cleanup preview resources
        shell: pwsh
        run: ./.github/scripts/docs/Cleanup-PreviewDocs.ps1 -Repository "${{ github.repository }}" -Token "${{ steps.app-token.outputs.token }}" -PullRequestNumber ${{ github.event.number }} -PreviewUrl "${{ env.PREVIEW_URL }}" -EnvironmentName "${{ env.PREVIEW_ENVIRONMENT }}" -HeadBranch "${{ env.PREVIEW_CLEANUP_BRANCH }}"
